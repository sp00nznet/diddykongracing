# DKR Audio RSP Microcode Recompilation Config
rom_file_path = "baserom.us.z64"
output_file_path = "rsp/aspMain.cpp"
output_function_name = "aspMain"
# aspMain text: ROM 0xD8760, next textbin (rspboot) at 0xD9620 -> size 0xEC0
text_offset = 0xD8760
text_size = 0xEC0
text_address = 0x04001000

# Command dispatch table entries from ucode_data (DMEM[0x10..0x2F])
# These are IMEM addresses for audio command handlers, loaded at runtime
# from ROM offset 0xEAA50 (VRAM 0x800E9E50). RSPRecomp can't read the
# data segment, so we must list them here.
extra_indirect_branch_targets = [
    0x1118, 0x14A4, 0x11EC, 0x1BA0,
    0x123C, 0x18D4, 0x1270, 0x12D4,
    0x12F0, 0x132C, 0x1428, 0x12A4,
    0x1E3C, 0x1390, 0x1758, 0x1480,
]
